name: CloudCommerce CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: apps/frontend
        run: npm run lint

      - name: Build Frontend
        working-directory: apps/frontend
        run: npm run build

  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        working-directory: apps/product-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Backend
        working-directory: apps/product-service
        run: ruff check .

      - name: Run Backend Tests
        working-directory: apps/product-service
        run: pytest

  docker:
    name: Docker Build
    needs:
      - frontend
      - backend

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build \
          -t cloudcommerce-backend:latest \
          ./apps/product-service

      - name: Build Frontend Docker Image
        run: |
          docker build \
          -t cloudcommerce-frontend:latest \
          ./apps/frontend
